<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ニャンコ占いの館 | あなた専用の癒やし空間</title>
    <style>
        /* =========================================
           1. テーマ変数と基本設定
        ========================================= */
        :root {
            --bg-grad-start: #fff0f5; --bg-grad-end: #ffe4e1;
            --text-main: #5d4037; --accent-color: #ff8da1;
            --card-bg: #ffffff; --text-muted: #8d6e63;
        }
        body.theme-morning { --bg-grad-start: #f0f8ff; --bg-grad-end: #e6e6fa; --text-main: #4a4a4a; --accent-color: #6495ed; }
        body.theme-night { --bg-grad-start: #2b1b3d; --bg-grad-end: #1a1025; --text-main: #e6e6fa; --accent-color: #dda0dd; --card-bg: #3a2b4d; --text-muted: #b0c4de; }

        body {
            background: linear-gradient(135deg, var(--bg-grad-start) 0%, var(--bg-grad-end) 100%);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden; -webkit-tap-highlight-color: transparent;
            transition: background 1s ease, color 0.5s ease;
        }

        /* 背景スタンプ（永続化）用コンテナ */
        #stampContainer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .bg-stamp { position: absolute; font-size: 2rem; opacity: 0.15; transform: rotate(-15deg); user-select: none; }
        body.theme-night .bg-stamp { opacity: 0.1; color: #fff; }

        /* =========================================
           2. ヘッダーとステータス
        ========================================= */
        header { text-align: center; padding: 25px 20px 10px 20px; z-index: 10; position: relative; width: 100%; box-sizing: border-box; }
        h1 { font-size: 1.6rem; color: var(--accent-color); margin: 0 0 5px 0; letter-spacing: 0.1em; text-shadow: 1px 1px 0px rgba(255,255,255,0.5); }
        .subtitle { font-size: 0.8rem; color: var(--text-muted); font-weight: bold; }
        
        .header-buttons { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .head-btn { background: rgba(255,255,255,0.7); border: 1px solid var(--accent-color); color: var(--accent-color); padding: 5px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        body.theme-night .head-btn { background: rgba(0,0,0,0.3); }

        .status-board { display: flex; flex-direction: column; align-items: center; gap: 5px; margin-top: 10px; }
        .encounter-badge { background-color: var(--card-bg); color: var(--accent-color); border: 2px solid var(--accent-color); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .title-badge { background: var(--accent-color); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* =========================================
           3. ガチャ（カード）演出
        ========================================= */
        main { width: 100%; max-width: 480px; padding: 10px 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; z-index: 10; position: relative; }

        .card-container { perspective: 1000px; width: 160px; height: 260px; margin: 15px 0; cursor: pointer; position: relative; }
        .rarity-badge { position: absolute; top: -10px; right: -10px; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.95rem; color: white; z-index: 10; opacity: 0; transform: scale(0); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s; }
        .card-container.flipped .rarity-badge { opacity: 1; transform: scale(1) rotate(15deg); }
        
        .r-sec { background: linear-gradient(135deg, #000000, #4b0082); box-shadow: 0 0 20px #8a2be2; border: 2px solid #ffd700; color: #ffd700; }
        .r-ur { background: linear-gradient(135deg, #ffd700, #ff8c00); box-shadow: 0 0 15px #ffd700; border: 2px solid #fff; }
        .r-ssr { background: linear-gradient(135deg, #ff00ff, #8a2be2); box-shadow: 0 0 15px #ff00ff; border: 2px solid #fff; }
        .r-sr { background: linear-gradient(135deg, #00bfff, #1e90ff); box-shadow: 0 0 10px #00bfff; border: 2px solid #fff; }
        .r-r { background: linear-gradient(135deg, #32cd32, #228b22); box-shadow: 0 0 5px #32cd32; border: 2px solid #fff; }

        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-container.flipped .card { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 24px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); display: flex; flex-direction: column; align-items: center; justify-content: center; border: 4px solid rgba(255,255,255,0.5); }
        .card-back { background: var(--accent-color); }
        .card-back::after { content: "🐾\A\A肉球で\A引くにゃ"; white-space: pre; text-align: center; font-size: 1rem; font-weight: bold; color: #fff; letter-spacing: 0.05em; animation: pulse 2s infinite ease-in-out; }
        .card-front { background-color: var(--card-bg); transform: rotateY(180deg); border-color: var(--accent-color); padding: 15px; box-sizing: border-box; }

        .card-emoji { font-size: 4rem; margin-bottom: 8px; animation: float 3s infinite ease-in-out; }
        .card-mood { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 2px; }
        .card-name { font-size: 0.95rem; font-weight: bold; color: var(--accent-color); text-align: center; }

        /* ガチャ溜め演出用 */
        @keyframes shakeLittle { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px) rotate(-1deg); } 75% { transform: translateX(2px) rotate(1deg); } }
        @keyframes shakeHard { 0%, 100% { transform: translate(0,0); } 20% { transform: translate(-4px, 2px) rotate(-3deg); } 40% { transform: translate(4px, -2px) rotate(3deg); } 60% { transform: translate(-4px, -2px) rotate(-3deg); } 80% { transform: translate(4px, 2px) rotate(3deg); } }
        .charging-r { animation: shakeLittle 0.1s infinite; }
        .charging-ur { animation: shakeHard 0.05s infinite; filter: brightness(1.5) drop-shadow(0 0 20px #ffd700); }
        #flashOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: white; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        #flashOverlay.flash { opacity: 1; transition: opacity 0.1s; }

        /* =========================================
           4. 結果エリア・なでなで・深呼吸
        ========================================= */
        .result-container { display: none; width: 100%; opacity: 0; transform: translateY(10px); transition: opacity 0.5s ease-out, transform 0.5s ease-out; margin-top: 10px; }
        .result-container.show { display: block; opacity: 1; transform: translateY(0); }

        .purrr-effect { text-align: center; font-size: 0.85rem; color: var(--accent-color); font-style: italic; letter-spacing: 0.2em; margin-top: 5px; animation: purrrShake 2s infinite ease-in-out; }
        .section-title { font-size: 0.95rem; color: var(--text-main); border-left: 4px solid var(--accent-color); padding-left: 8px; margin: 20px 0 10px 0; font-weight: bold; }
        .result-text { font-size: 0.9rem; line-height: 1.6; color: var(--text-main); background: rgba(255, 255, 255, 0.6); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.4); backdrop-filter: blur(5px); }
        body.theme-night .result-text { background: rgba(0, 0, 0, 0.4); border-color: rgba(255,255,255,0.1); }
        .affirmation-text { font-size: 1.05rem; font-weight: bold; color: var(--accent-color); text-align: center; border: 2px dashed var(--accent-color); }

        .pet-btn-wrapper { text-align: center; margin: 25px 0 10px 0; position: relative; }
        .pet-btn { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); border: none; color: #d81b60; font-size: 1.1rem; font-weight: bold; padding: 12px 30px; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(255,154,158,0.4); transition: transform 0.1s; }
        .pet-btn:active { transform: scale(0.95); }
        .pet-reaction { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); font-size: 0.85rem; font-weight: bold; color: #ff4757; background: white; padding: 5px 12px; border-radius: 15px; border: 2px solid #ff4757; opacity: 0; transition: opacity 0.3s; white-space: nowrap; pointer-events: none; }
        .pet-reaction.show { opacity: 1; top: -45px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .breathe-btn-wrapper { text-align: center; margin-top: 25px; }
        .breathe-trigger-btn { background: transparent; border: 2px solid var(--accent-color); color: var(--accent-color); font-size: 0.95rem; font-weight: bold; padding: 12px 25px; border-radius: 30px; cursor: pointer; transition: all 0.3s; }
        .breathe-trigger-btn:hover { background: var(--accent-color); color: white; }

        /* アフィリエイト枠 */
        .affiliate-box { background: rgba(255,255,255,0.7); border: 2px dashed var(--accent-color); border-radius: 16px; padding: 15px; margin-top: 10px; display: flex; align-items: center; gap: 12px; }
        body.theme-night .affiliate-box { background: rgba(0,0,0,0.4); }
        .product-info { flex-grow: 1; }
        .product-title { font-size: 0.85rem; font-weight: bold; margin-bottom: 2px; }
        .product-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.3; }
        .buy-btn { background: var(--accent-color); color: #fff; text-decoration: none; font-size: 0.8rem; font-weight: bold; padding: 12px 14px; border-radius: 20px; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: transform 0.2s; }
        .buy-btn:hover { transform: scale(1.05); }

        /* =========================================
           5. モーダル（図鑑・名前・深呼吸）
        ========================================= */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s; }
        .modal.show { display: flex; opacity: 1; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; position: relative; border: 3px solid var(--accent-color); color: var(--text-main); }
        
        .name-input { width: 80%; padding: 10px; border: 2px solid var(--accent-color); border-radius: 10px; font-size: 1rem; margin-top: 15px; text-align: center; }
        .save-btn { margin-top: 15px; background: var(--accent-color); color: white; border: none; padding: 10px 20px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        .book-content { width: 95%; max-width: 480px; max-height: 85vh; overflow-y: auto; padding: 20px 10px; }
        .book-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .book-item { background: var(--bg-grad-start); border-radius: 12px; padding: 10px 5px; text-align: center; border: 1px solid rgba(0,0,0,0.05); position: relative; }
        body.theme-night .book-item { border-color: rgba(255,255,255,0.1); }
        .book-item.unknown { filter: grayscale(100%) opacity(0.4); background: #eee; }
        body.theme-night .book-item.unknown { background: #333; }
        .book-emoji { font-size: 2rem; margin-bottom: 5px; }
        .book-name { font-size: 0.65rem; font-weight: bold; line-height: 1.2; height: 2.4em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .book-rarity { font-size: 0.6rem; font-weight: bold; margin-bottom: 2px; }
        .book-stats { font-size: 0.85rem; color: var(--text-muted); font-weight: bold; margin-bottom: 10px; }
        .close-modal-btn { position: absolute; top: 10px; right: 15px; background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; padding: 0; }

        /* 深呼吸オーバーレイ */
        .breathe-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; color: white; opacity: 0; transition: opacity 0.5s; }
        .breathe-overlay.show { display: flex; opacity: 1; }
        .breathe-circle { width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, #ffb7c5 0%, #a8edea 100%); display: flex; align-items: center; justify-content: center; font-size: 4.5rem; box-shadow: 0 0 40px rgba(255,183,197,0.5); transition: transform 4s ease-in-out; }
        .breathe-text { font-size: 1.5rem; font-weight: bold; margin-top: 40px; text-align: center; height: 60px; letter-spacing: 0.1em; }
        .breathe-subtext { font-size: 1rem; color: #ffb7c5; margin-top: 10px; height: 20px; font-weight: bold; }
        .close-breathe { margin-top: 50px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.5); color: white; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }

        /* =========================================
           6. SNSシェア・パレード演出・その他
        ========================================= */
        .sns-btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .sns-btn { width: 100%; background-color: var(--card-bg); color: var(--text-main); border: 2px solid var(--accent-color); padding: 12px; border-radius: 12px; font-size: 0.85rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .sns-btn.x { border-color: #1DA1F2; color: #1DA1F2; }
        .sns-btn.insta { border-color: #E1306C; color: #E1306C; }
        
        .reset-btn { background: none; border: none; color: var(--text-muted); text-decoration: underline; padding: 15px; cursor: pointer; margin: 10px auto; display: block; font-size: 0.8rem; }
        .clear-stamp-btn { background: none; border: none; color: #aaa; text-decoration: underline; font-size: 0.7rem; cursor: pointer; margin-top: 20px; }

        .toast { position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; z-index: 9999; white-space: nowrap; transition: bottom 0.4s; }
        .toast.show { bottom: 30px; }

        .parade-item { position: fixed; bottom: -50px; font-size: 2rem; pointer-events: none; z-index: 999; animation: floatUpParade 3s ease-out forwards; }
        .interactive-paw { position: fixed; font-size: 1.5rem; color: var(--accent-color); pointer-events: none; z-index: 999; animation: floatUp 1.2s ease-out forwards; }

        /* スクショモード */
        body.screenshot-mode header, body.screenshot-mode .sns-btn-group, body.screenshot-mode .breathe-btn-wrapper, body.screenshot-mode .reset-btn, body.screenshot-mode footer, body.screenshot-mode .clear-stamp-btn { display: none !important; }
        .screenshot-overlay { display: none; position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; z-index: 9999; }
        body.screenshot-mode .screenshot-overlay { display: block; }

        @keyframes floatUp { 0% { opacity: 0.8; transform: translateY(0) scale(0.8) rotate(-10deg); } 100% { opacity: 0; transform: translateY(-40px) scale(1.5) rotate(20deg); } }
        @keyframes floatUpParade { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes purrrShake { 0%, 100% { transform: translateX(0); opacity: 0.5; } 25% { transform: translateX(-1px); opacity: 0.8; } 75% { transform: translateX(1px); opacity: 0.8; } }
    </style>
</head>
<body>

    <!-- 背景スタンプコンテナ -->
    <div id="stampContainer"></div>

    <!-- フラッシュ演出 -->
    <div id="flashOverlay"></div>
    <div class="screenshot-overlay" id="screenshotOverlay">📸 画面をスクショしてね（タップで戻る）</div>

    <header>
        <h1 id="mainTitle">🐾 ニャンコ占いの館</h1>
        <div class="subtitle" id="subTitle">あなた専用の癒やし空間にゃん</div>
        <div class="header-buttons">
            <button class="head-btn" onclick="openNameModal()">⚙️ お名前設定</button>
            <button class="head-btn" onclick="openBookModal()">📖 猫ちゃん図鑑</button>
        </div>
        <div class="status-board" id="statusBoard" style="display:none;">
            <div id="encounterBadge" class="encounter-badge">連続お世話: 0日目</div>
            <div id="titleBadge" class="title-badge">称号</div>
        </div>
    </header>

    <main>
        <div class="card-container" id="cardContainer">
            <div class="rarity-badge" id="rarityBadge">R</div>
            <div class="card" id="tarotCard">
                <div class="card-back"></div>
                <div class="card-front">
                    <div class="card-emoji" id="cardEmoji">🐱</div>
                    <div class="card-mood" id="cardMood"></div>
                    <div class="card-name" id="cardName">猫ちゃん</div>
                </div>
            </div>
        </div>

        <div class="result-container" id="resultContainer">
            <div class="purrr-effect">ゴロゴロ… ゴロゴロ…</div>

            <div class="section-title">💖 猫ちゃんからの全肯定</div>
            <div class="result-text affirmation-text" id="textAffirmation"></div>

            <div class="section-title">🐱 お世話係のガチ・メッセージ</div>
            <div class="result-text" id="textPower"></div>

            <div class="pet-btn-wrapper">
                <div class="pet-reaction" id="petReaction">にゃん！</div>
                <button class="pet-btn" id="petBtn">🖐️ この子をなでなでする</button>
            </div>

            <div class="breathe-btn-wrapper">
                <button class="breathe-trigger-btn" onclick="startBreathing()">🧘‍♀️ 猫ちゃんと1分間深呼吸する</button>
            </div>

            <div class="section-title">🐟 感謝の気持ちを貢ぐ</div>
            <div class="affiliate-box">
                <div class="product-info">
                    <div class="product-title" id="productTitle"></div>
                    <div class="product-desc" id="productDesc"></div>
                </div>
                <a href="" target="_blank" rel="noopener noreferrer" class="buy-btn" id="productLink">貢ぐにゃん</a>
            </div>

            <div class="sns-btn-group">
                <button class="sns-btn x" id="shareXBtn">📱 X / Threads で結果をつぶやく</button>
                <button class="sns-btn insta" id="shareInstaBtn">📸 インスタ用にスクショモードにする</button>
            </div>

            <button class="reset-btn" id="resetBtn">別の猫ちゃんを呼ぶ</button>
            <button class="clear-stamp-btn" onclick="clearStamps()">🧹 背景の思い出（スタンプ）をリセット</button>
        </div>
    </main>

    <!-- 各種モーダル・オーバーレイ -->
    <div class="breathe-overlay" id="breatheOverlay">
        <div class="breathe-circle" id="breatheCircle">🐱</div>
        <div class="breathe-text" id="breatheText">まずは、息を全部吐き出すにゃん...</div>
        <div class="breathe-subtext" id="breatheSubtext"></div>
        <button class="close-breathe" onclick="stopBreathing()">途中でやめる</button>
    </div>

    <div class="modal" id="nameModal">
        <div class="modal-content">
            <h2 style="color:var(--accent-color); margin-top:0;">🐾 お名前を教えてにゃ</h2>
            <p style="font-size: 0.85rem; color:var(--text-muted);">猫ちゃんがあなたを名前で呼びます</p>
            <input type="text" id="nameInput" class="name-input" placeholder="例: はなこ" maxlength="10">
            <button class="save-btn" onclick="saveName()">決定にゃん！</button>
        </div>
    </div>

    <div class="modal" id="bookModal">
        <div class="modal-content book-content">
            <button class="close-modal-btn" onclick="closeBookModal()">✖</button>
            <h2 style="color:var(--accent-color); margin-top:0;">📖 出会った猫図鑑</h2>
            <div class="book-stats">収集率: <span id="bookProgress">0/73</span></div>
            <div class="book-grid" id="bookGrid"></div>
        </div>
    </div>

    <div class="toast" id="toast">🐾 コピー完了！好きな場所に貼り付けてね</div>

    <footer style="margin-top:auto; padding:20px; font-size:0.7rem; color:var(--text-muted); text-align:center;">
        &copy; ニャンコ占いの館. (完全無料 / 著作権フリー)<br>
        <span style="font-size: 0.65rem;">※メニューから「ホーム画面に追加」して毎日の癒やしにしてにゃ🐾</span>
    </footer>

    <script>
        // =========================================
        // 1. グローバル変数と初期化
        // =========================================
        let userName = localStorage.getItem('nyanko_name') || 'あなた';
        let loginStreak = parseInt(localStorage.getItem('nyanko_login_streak')) || 0;
        let lastLoginDate = localStorage.getItem('nyanko_last_login');
        let totalEncounters = parseInt(localStorage.getItem('nyanko_total_encounters')) || 0;
        let affectionData = JSON.parse(localStorage.getItem('nyanko_affection')) || {};
        let bgStamps = JSON.parse(localStorage.getItem('nyanko_bg_stamps')) || [];
        
        let isFlipped = false;
        let currentResult = null;
        let currentCatId = null;
        let isBreathing = false;
        let breatheInterval;

        const urlParams = new URLSearchParams(window.location.search);
        const userA8Id = urlParams.get('a8') ? urlParams.get('a8').trim() : '';
        const a8BaseUrl = "https://px.a8.net/svt/ejp?a8mat=";

        // =========================================

            { id: 73, rarity: "R", name: "ただの 可愛い猫", emoji: "🐈", power: "にゃ〜。「[NAME]」、特別な理由なんてなくても、あなたは存在してるだけで可愛くて価値があるにゃん。そのまま生きててにゃ！", itemTitle: "ねこ図鑑", itemDesc: "もっと猫を知る。", keyword: "猫+写真集" }

        // 各種バリエーション
        const moods = ["超絶甘えん坊な", "少し眠そうな", "やたらテンションが高い", "何かを企んでいる", "悟りを開いた", "お腹を空かせた", "なでてほしい", "ツンデレな", "かまってちゃんな", "パトロール中の", "丸くなっている", "獲物を狙う"];
        const affirmations = [
            "今日も息をして生きてるだけで100点満点にゃ！",
            "何もできなくても、[NAME]の価値は絶対に減らないにゃん。",
            "頑張りすぎにゃ。今日は「自分を甘やかす日」に指定したにゃ！",
            "そのままの[NAME]が一番可愛くて最高だにゃん🐾",
            "誰が何と言おうと、猫ちゃんたちは[NAME]の味方にゃ！",
            "疲れたら逃げていいにゃ。猫も嫌な時はすぐ逃げるにゃん。",
            "美味しいものを食べて、たくさん寝るのが生き物の正解にゃ！",
            "過去の失敗なんて猫砂と一緒に埋めてしまえばいいにゃん。",
            "他人の期待になんて応えなくていいにゃ。自分のために生きるにゃ！",
            "よく頑張ったにゃ！えらい！天才！宇宙一！！"

        const bgStampEmojis = ["🐾", "💕", "🐱", "✨", "🐟", "🎀", "⭐", "🎵", "💤"];

        // =========================================
        // 3. 初期処理とテーマ管理
        // =========================================
        document.addEventListener('DOMContentLoaded', () => {
            updateTheme();
            updateLoginStreak();
            updateNameDisplay();
            loadStamps();

            // 肉球クリックエフェクト
            document.body.addEventListener('click', (e) => {
                if(e.target.closest('button') || e.target.closest('a') || e.target.closest('.card-container') || document.body.classList.contains('screenshot-mode')) return;
                createInteractivePaw(e.pageX, e.pageY);
            });

            // スクショモード解除
            document.body.addEventListener('click', (e) => {
                if (document.body.classList.contains('screenshot-mode') && !e.target.closest('.sns-btn')) {
                    document.body.classList.remove('screenshot-mode');
                }
            });

            // ガチャ実行イベント
            const cardContainer = document.getElementById('cardContainer');
            if (cardContainer) {
                cardContainer.addEventListener('click', drawCat);
            }

            // なでなでイベント
            document.getElementById('petBtn').addEventListener('click', petCat);

            // リセットイベント
            document.getElementById('resetBtn').addEventListener('click', resetGacha);
        });

        function updateTheme() {
            const hour = new Date().getHours();
            const mainTitle = document.getElementById('mainTitle');
            const subTitle = document.getElementById('subTitle');
            
            if (hour >= 5 && hour < 12) {
                document.body.className = 'theme-morning';
                mainTitle.innerText = "🌅 朝のニャンコ占い";
                subTitle.innerText = "おはよう！今日も1日、無理せずいくにゃん";
            } else if (hour >= 12 && hour < 18) {
                document.body.className = ''; // default
                mainTitle.innerText = "☀️ 陽だまりニャンコ占い";
                subTitle.innerText = "お疲れ様にゃ。ちょっと一息入れていくにゃん";
            } else {
                document.body.className = 'theme-night';
                mainTitle.innerText = "🌙 深夜のニャンコ保健室";
                subTitle.innerText = "今日もよく頑張ったにゃ。猫に癒やされて眠るにゃん";
            }
        }

        function updateLoginStreak() {
            const today = new Date().toDateString();
            if (lastLoginDate !== today) {
                if (lastLoginDate === new Date(Date.now() - 86400000).toDateString()) {
                    loginStreak++;
                } else {
                    loginStreak = 1;
                }
                lastLoginDate = today;
                localStorage.setItem('nyanko_login_streak', loginStreak);
                localStorage.setItem('nyanko_last_login', today);
            }
            if (loginStreak > 0) {
                document.getElementById('statusBoard').style.display = 'flex';
                document.getElementById('encounterBadge').innerText = `連続お世話: ${loginStreak}日目🐾 (通算 ${totalEncounters}回)`;
            }
        }

        function getCatTitle(count) {
            if (count === 0) return "迷い込んだ旅人";
            if (count <= 3) return "通りすがりの猫好き";
            if (count <= 10) return "見習いお世話係";
            if (count <= 25) return "頼れるキャットシッター";
            if (count <= 50) return "猫カフェの名誉店長";
            if (count <= 99) return "猫語を解する者";
            return "👑 猫に愛されし神";
        }

        // =========================================
        // 4. ガチャ（占い）ロジック
        // =========================================
        function drawCat() {
            if (isFlipped) return;
            isFlipped = true;
            
            // 確率計算
            const rand = Math.random();
            let targetRarity = "R";
            if (rand < 0.01) targetRarity = "SEC";
            else if (rand < 0.05) targetRarity = "UR";
            else if (rand < 0.15) targetRarity = "SSR";
            else if (rand < 0.40) targetRarity = "SR";

            const filteredCats = catData.filter(c => c.rarity === targetRarity);
            const baseCat = filteredCats[Math.floor(Math.random() * filteredCats.length)];
            const mood = moods[Math.floor(Math.random() * moods.length)];
            currentResult = { ...baseCat, mood: mood };
            currentCatId = baseCat.id;

            // 記録更新
            totalEncounters++;
            localStorage.setItem('nyanko_total_encounters', totalEncounters);
            if (!affectionData[currentCatId]) affectionData[currentCatId] = 0;
            // 引いたことによる好感度+1
            affectionData[currentCatId]++;
            localStorage.setItem('nyanko_affection', JSON.stringify(affectionData));

            document.getElementById('encounterBadge').innerText = `連続お世話: ${loginStreak}日目🐾 (通算 ${totalEncounters}回)`;
            document.getElementById('titleBadge').innerText = getCatTitle(totalEncounters);

            // 溜め演出の決定
            const cardContainer = document.getElementById('cardContainer');
            let chargeTime = 600;
            if (targetRarity === "SEC" || targetRarity === "UR") {
                chargeTime = 2500;
                cardContainer.classList.add('charging-ur');
            } else if (targetRarity === "SSR") {
                chargeTime = 1200;
                cardContainer.classList.add('charging-r');
            }

            setTimeout(() => {
                // 演出リセットと結果表示
                cardContainer.classList.remove('charging-ur', 'charging-r');
                
                if (targetRarity === "SEC" || targetRarity === "UR") {
                    const flash = document.getElementById('flashOverlay');
                    flash.classList.add('flash');
                    setTimeout(() => flash.classList.remove('flash'), 150);
                    startCatShower(40);
                } else if (targetRarity === "SSR") {
                    startCatShower(20);
                }

                showResultUI();
            }, chargeTime);
        }

        function showResultUI() {
            const cardContainer = document.getElementById('cardContainer');
            const rLow = currentResult.rarity.toLowerCase();
            
            cardContainer.className = `card-container flipped`;
            document.querySelector('.card-front').className = `card-front r-${rLow}`;
            
            const badge = document.getElementById('rarityBadge');
            badge.className = `rarity-badge r-${rLow}`;
            badge.innerText = currentResult.rarity;

            document.getElementById('cardEmoji').innerText = currentResult.emoji;
            document.getElementById('cardMood').innerText = currentResult.mood;
            document.getElementById('cardName').innerText = currentResult.name;

            // 文章中の [NAME] を置き換える
            const pText = currentResult.power.replace(/\[NAME\]/g, userName);
            document.getElementById('textPower').innerText = pText;
            
            const aText = affirmations[Math.floor(Math.random() * affirmations.length)].replace(/\[NAME\]/g, userName);
            document.getElementById('textAffirmation').innerText = aText;

            document.getElementById('productTitle').innerText = currentResult.itemTitle;
            document.getElementById('productDesc').innerText = currentResult.itemDesc;

            let finalLink = `https://search.rakuten.co.jp/search/mall/${currentResult.keyword}/`;
            if (userA8Id && userA8Id.startsWith("s0000")) {
                finalLink = `${a8BaseUrl}${userA8Id}/&rakuten=y&a8url=https%3A%2F%2Fsearch.rakuten.co.jp%2Fsearch%2Fmall%2F${currentResult.keyword}%2F`;
            }
            document.getElementById('productLink').href = finalLink;

            setTimeout(() => {
                const resContainer = document.getElementById('resultContainer');
                resContainer.classList.add('show');
                resContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 600);
        }

        function resetGacha() {
            isFlipped = false;
            currentResult = null;
            currentCatId = null;
            document.getElementById('resultContainer').classList.remove('show');
            const cardContainer = document.getElementById('cardContainer');
            cardContainer.className = 'card-container';
            document.querySelector('.card-front').className = 'card-front';
            document.getElementById('petReaction').classList.remove('show');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // =========================================
        // 5. なでなで・好感度・パレードロジック
        // =========================================
        function petCat() {
            if(!currentCatId) return;
            
            // 好感度アップ
            affectionData[currentCatId]++;
            localStorage.setItem('nyanko_affection', JSON.stringify(affectionData));
            
            const aff = affectionData[currentCatId];
            let msg = "にゃん！";
            if(aff > 20) msg = `${userName}、大好きにゃあああん💕`;
            else if(aff > 10) msg = "ゴロゴロ…もっと撫でてにゃ💕";
            else if(aff > 5) msg = "悪くないにゃ。続けるにゃ🐾";
            else msg = ["シャーッ！（触るな）", "スンッ…", "にゃん？", "尻尾パタン"][Math.floor(Math.random()*4)];

            const reaction = document.getElementById('petReaction');
            reaction.innerText = msg;
            reaction.classList.remove('show');
            void reaction.offsetWidth; // reflow
            reaction.classList.add('show');

            // 画面にランダムな足跡/ハート（一時的）
            createInteractivePaw(
                Math.random() * window.innerWidth,
                window.innerHeight / 2 + (Math.random() * 200 - 100)
            );

            // 背景スタンプ（永続化）追加
            const emoji = bgStampEmojis[Math.floor(Math.random() * bgStampEmojis.length)];
            const x = Math.floor(Math.random() * 90) + 5; // 5-95%
            const y = Math.floor(Math.random() * 90) + 5; // 5-95%
            addStampToBg(emoji, x, y);

            // 高好感度でたまにパレード
            if (aff > 15 && Math.random() < 0.3) {
                startCatShower(20);
            }
        }

        function startCatShower(amount) {
            const emojis = ['🐱', '🐈', '🐾', '💕', '✨', '🐟'];
            for(let i=0; i<amount; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'parade-item';
                    el.innerText = emojis[Math.floor(Math.random()*emojis.length)];
                    el.style.left = Math.random() * window.innerWidth + 'px';
                    el.style.animationDuration = (2 + Math.random() * 2) + 's';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 4000);
                }, i * 50);
            }
        }

        function createInteractivePaw(x, y) {
            const paw = document.createElement('div');
            paw.className = 'interactive-paw';
            paw.innerText = ['🐾','💕','✨'][Math.floor(Math.random()*3)];
            paw.style.left = (x - 12) + 'px';
            paw.style.top = (y - 15) + 'px';
            document.body.appendChild(paw);
            setTimeout(() => paw.remove(), 1200);
        }

        // =========================================
        // 6. 永続背景スタンプ管理
        // =========================================
        function addStampToBg(emoji, xPercent, yPercent) {
            const stamp = { e: emoji, x: xPercent, y: yPercent };
            bgStamps.push(stamp);
            if(bgStamps.length > 100) bgStamps.shift(); // 最大100個
            localStorage.setItem('nyanko_bg_stamps', JSON.stringify(bgStamps));
            renderStamp(stamp);
        }

        function renderStamp(stamp) {
            const el = document.createElement('div');
            el.className = 'bg-stamp';
            el.innerText = stamp.e;
            el.style.left = stamp.x + '%';
            el.style.top = stamp.y + '%';
            document.getElementById('stampContainer').appendChild(el);
        }

        function loadStamps() {
            const container = document.getElementById('stampContainer');
            container.innerHTML = '';
            bgStamps.forEach(stamp => renderStamp(stamp));
        }

        window.clearStamps = function() {
            if(confirm("背景のスタンプをすべて消去しますか？")) {
                bgStamps = [];
                localStorage.removeItem('nyanko_bg_stamps');
                loadStamps();
            }
        }

        // =========================================
        // 7. マインドフルネス（深呼吸）ロジック
        // =========================================
        window.startBreathing = function() {
            if(isBreathing) return;
            isBreathing = true;
            const overlay = document.getElementById('breatheOverlay');
            const circle = document.getElementById('breatheCircle');
            const text = document.getElementById('breatheText');
            const subtext = document.getElementById('breatheSubtext');
            
            overlay.classList.add('show');
            circle.style.transform = 'scale(1)';
            text.innerText = "まずは、息を全部吐き出すにゃん...";
            subtext.innerText = "";

            let cycle = 0;
            const maxCycles = 5; // 1サイクル10秒 × 5回
            const praises = ["上手だにゃ", "いい感じにゃん", "嫌なものを全部出すにゃ", "肩の力を抜くにゃ", `${userName}、えらいにゃん`];

            setTimeout(() => { breatheCycle(); }, 3000);

            function breatheCycle() {
                if(!isBreathing) return;
                if(cycle >= maxCycles) {
                    finishBreathing();
                    return;
                }

                text.innerText = "すーっ……（吸う）";
                subtext.innerText = "";
                circle.style.transition = 'transform 4s ease-out';
                circle.style.transform = 'scale(1.8)';
                
                breatheInterval = setTimeout(() => {
                    if(!isBreathing) return;
                    text.innerText = "はーっ……（吐く）";
                    subtext.innerText = praises[Math.floor(Math.random() * praises.length)];
                    circle.style.transition = 'transform 6s ease-in-out';
                    circle.style.transform = 'scale(1)';
                    
                    cycle++;
                    breatheInterval = setTimeout(breatheCycle, 6000);
                }, 4000);
            }

            function finishBreathing() {
                text.innerText = `${userName}、えらいにゃん！\n心がしっかり整ったにゃ🐾`;
                subtext.innerText = "今日もゆっくり休んでにゃ";
                isBreathing = false;
            }
        };

        window.stopBreathing = function() {
            isBreathing = false;
            clearTimeout(breatheInterval);
            document.getElementById('breatheOverlay').classList.remove('show');
        };

        // =========================================
        // 8. モーダル管理（名前・図鑑）
        // =========================================
        window.openNameModal = function() {
            document.getElementById('nameInput').value = userName === 'あなた' ? '' : userName;
            document.getElementById('nameModal').classList.add('show');
        };

        window.saveName = function() {
            const val = document.getElementById('nameInput').value.trim();
            userName = val || 'あなた';
            localStorage.setItem('nyanko_name', userName);
            document.getElementById('nameModal').classList.remove('show');
            updateNameDisplay();
            showToast(`これからは「${userName}」って呼ぶにゃん🐾`);
        };

        function updateNameDisplay() {
            document.querySelector('.head-btn').innerText = userName === 'あなた' ? '⚙️ お名前設定' : `⚙️ 名前: ${userName}`;
        }

        window.openBookModal = function() {
            const grid = document.getElementById('bookGrid');
            grid.innerHTML = '';
            let collectedCount = 0;

            catData.forEach(cat => {
                const isCollected = affectionData[cat.id] > 0;
                if (isCollected) collectedCount++;

                const item = document.createElement('div');
                item.className = `book-item ${isCollected ? '' : 'unknown'}`;
                
                if (isCollected) {
                    const rClass = `r-${cat.rarity.toLowerCase()}`;
                    const hearts = '💖'.repeat(Math.min(3, Math.ceil(affectionData[cat.id] / 3))) || '💖';
                    item.innerHTML = `
                        <div class="book-rarity" style="color:var(--accent-color);">${cat.rarity}</div>
                        <div class="book-emoji">${cat.emoji}</div>
                        <div class="book-name">${cat.name}</div>
                        <div style="font-size:0.6rem; margin-top:4px; letter-spacing:-2px;">${hearts}</div>
                    `;
                } else {
                    item.innerHTML = `
                        <div class="book-rarity" style="color:#999;">???</div>
                        <div class="book-emoji">❓</div>
                        <div class="book-name">未発見</div>
                    `;
                }
                grid.appendChild(item);
            });

            document.getElementById('bookProgress').innerText = `${collectedCount} / ${catData.length}`;
            document.getElementById('bookModal').classList.add('show');
        };

        window.closeBookModal = function() {
            document.getElementById('bookModal').classList.remove('show');
        };

        // =========================================
        // 9. SNSシェア関連
        // =========================================
        document.getElementById('shareXBtn').addEventListener('click', () => {
            const text = `【ニャンコ占いの館🐾】\nランク: ${getCatTitle(totalEncounters)}\n今のお世話係は「${currentResult.mood} ${currentResult.name}」でした！\n\n💖猫ちゃんからの全肯定:\n「${document.getElementById('textAffirmation').innerText}」\n\n👇あなたも癒やされる\n${window.location.href}\n#ニャンコ占いの館 #癒やし #猫`;
            copyText(text);
        });

        document.getElementById('shareInstaBtn').addEventListener('click', () => {
            document.body.classList.add('screenshot-mode');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => showToast("🐾 コピー完了！好きな場所に貼り付けてね")).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast("🐾 コピー完了！好きな場所に貼り付けてね");
            } catch (err) { alert("画面をスクショしてシェアしてにゃん🐾"); }
            document.body.removeChild(textArea);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            if(msg) toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }
    </script>
</body>
</html>
