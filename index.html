<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ニャンコ占いの館 | あなた専用の癒やしと深呼吸</title>
    <style>
        :root {
            --bg-grad-start: #fff0f5; --bg-grad-end: #ffe4e1;
            --text-main: #5d4037; --accent-color: #ff8da1;
            --card-bg: #ffffff; --text-muted: #8d6e63;
        }
        body.theme-morning { --bg-grad-start: #f0f8ff; --bg-grad-end: #e6e6fa; --text-main: #4a4a4a; --accent-color: #87cefa; }
        body.theme-night { --bg-grad-start: #2b1b3d; --bg-grad-end: #1a1025; --text-main: #e6e6fa; --accent-color: #dda0dd; --card-bg: #3a2b4d; --text-muted: #b0c4de; }

        body {
            background: linear-gradient(135deg, var(--bg-grad-start) 0%, var(--bg-grad-end) 100%);
            color: var(--text-main); font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden; -webkit-tap-highlight-color: transparent; transition: background 1s ease;
        }

        /* ヘッダー周り */
        header { text-align: center; padding: 20px 20px 5px 20px; z-index: 10; position: relative; width: 100%; box-sizing: border-box; }
        h1 { font-size: 1.6rem; color: var(--accent-color); margin: 0 0 5px 0; letter-spacing: 0.1em; text-shadow: 1px 1px 0px rgba(255,255,255,0.5); }
        .subtitle { font-size: 0.85rem; color: var(--text-muted); font-weight: bold; line-height: 1.4; }
        .name-btn { background: none; border: 1px dashed var(--accent-color); color: var(--accent-color); font-size: 0.7rem; padding: 4px 8px; border-radius: 12px; cursor: pointer; margin-top: 5px; }

        .status-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 15px; }
        .badge { background-color: var(--card-bg); color: var(--accent-color); border: 2px solid var(--accent-color); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .badge.highlight { background: var(--accent-color); color: white; }

        main { width: 100%; max-width: 480px; padding: 10px 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; z-index: 10; position: relative; }

        .card-container { perspective: 1000px; width: 160px; height: 260px; margin: 10px 0 20px 0; cursor: pointer; position: relative; }
        .rarity-badge { position: absolute; top: -10px; right: -10px; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; color: white; z-index: 10; opacity: 0; transform: scale(0); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s; }
        .card-container.flipped .rarity-badge { opacity: 1; transform: scale(1) rotate(10deg); }
        
        .rarity-sec { background: linear-gradient(135deg, #000000, #4b0082); box-shadow: 0 0 20px #8a2be2; border: 2px solid #ffd700; color: #ffd700; }
        .rarity-ur { background: linear-gradient(135deg, #ffd700, #ff8c00); box-shadow: 0 0 15px #ffd700; border: 2px solid #fff; }
        .rarity-ssr { background: linear-gradient(135deg, #ff00ff, #8a2be2); box-shadow: 0 0 15px #ff00ff; border: 2px solid #fff; }
        .rarity-sr { background: linear-gradient(135deg, #00bfff, #1e90ff); box-shadow: 0 0 10px #00bfff; border: 2px solid #fff; }
        .rarity-r { background: linear-gradient(135deg, #32cd32, #228b22); box-shadow: 0 0 5px #32cd32; border: 2px solid #fff; }

        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-container.flipped .card { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 24px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card-back { background: var(--accent-color); border: 3px solid rgba(255,255,255,0.5); }
        .card-back::after { content: "🐾\A\A肉球でタッチ"; white-space: pre; text-align: center; font-size: 0.95rem; font-weight: bold; color: #fff; letter-spacing: 0.05em; animation: pulse 2s infinite ease-in-out; }
        .card-front { background-color: var(--card-bg); transform: rotateY(180deg); border: 3px solid var(--accent-color); padding: 15px; box-sizing: border-box; }

        .card-emoji { font-size: 3.5rem; margin-bottom: 8px; animation: float 3s infinite ease-in-out; }
        .card-mood { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 2px; text-align: center; }
        .card-name { font-size: 0.95rem; font-weight: bold; color: var(--accent-color); text-align: center; }

        /* ガチャ・溜め演出 */
        .gacha-charging { animation: shakeCard 0.1s infinite; }
        .gacha-charging.r { filter: drop-shadow(0 0 10px #32cd32); }
        .gacha-charging.sr { filter: drop-shadow(0 0 20px #1e90ff); animation-duration: 0.08s; }
        .gacha-charging.ssr { filter: drop-shadow(0 0 30px #ff00ff); animation-duration: 0.06s; }
        .gacha-charging.ur { filter: drop-shadow(0 0 50px #ffd700); animation-duration: 0.04s; }
        .gacha-charging.sec { filter: drop-shadow(0 0 80px #8a2be2); animation-duration: 0.02s; }
        @keyframes shakeCard { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-1px, -2px) rotate(-1deg); } 40% { transform: translate(-3px, 0px) rotate(1deg); } 60% { transform: translate(3px, 2px) rotate(0deg); } 80% { transform: translate(1px, -1px) rotate(1deg); } 100% { transform: translate(-1px, 2px) rotate(-1deg); } }

        .flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.1s; }
        .flash-overlay.show { opacity: 1; transition: opacity 0.5s ease-out; }
        .flash-overlay.fadeOut { opacity: 0; transition: opacity 1s ease-in; }

        /* 結果コンテナ・各種ボタン */
        .result-container { display: none; width: 100%; opacity: 0; transform: translateY(10px); transition: opacity 0.5s ease-out, transform 0.5s ease-out; }
        .result-container.show { display: block; opacity: 1; transform: translateY(0); }

        .purrr-effect { display: none; text-align: center; font-size: 0.85rem; color: var(--accent-color); font-style: italic; letter-spacing: 0.2em; margin-bottom: 10px; animation: purrrShake 2s infinite ease-in-out; }
        .result-container.show .purrr-effect { display: block; }

        .pet-btn { width: 100%; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #d81b60; border: 2px solid #ff8da1; padding: 15px; border-radius: 16px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin: 10px 0; box-shadow: 0 5px 15px rgba(255,141,161,0.3); transition: transform 0.1s; position: relative; overflow: hidden; }
        .pet-btn:active { transform: scale(0.96); }
        .pet-response { text-align: center; color: var(--accent-color); font-weight: bold; font-size: 0.9rem; min-height: 20px; margin-bottom: 10px; transition: 0.3s; }

        .breathe-btn { width: 100%; background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #4a4a4a; border: 2px solid #a8edea; padding: 15px; border-radius: 16px; font-size: 1rem; font-weight: bold; cursor: pointer; margin: 20px 0 10px 0; box-shadow: 0 5px 15px rgba(168,237,234,0.3); display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .breathe-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .breathe-overlay.show { display: flex; animation: fadeIn 0.5s; }
        .breathe-circle { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, #ffb7c5 0%, #a8edea 100%); display: flex; align-items: center; justify-content: center; font-size: 4rem; box-shadow: 0 0 30px rgba(255,183,197,0.5); transition: transform 4s ease-in-out; }
        .breathe-text { font-size: 1.5rem; font-weight: bold; margin-top: 30px; text-align: center; height: 60px; letter-spacing: 0.1em; }
        .breathe-subtext { font-size: 0.9rem; color: #ccc; margin-top: 10px; height: 20px; }
        .close-breathe { margin-top: 40px; background: none; border: 1px solid white; color: white; padding: 8px 20px; border-radius: 20px; cursor: pointer; opacity: 0; transition: opacity 0.5s; }

        /* テキスト・アフィリエイト・SNS要素 */
        .section-title { font-size: 0.9rem; color: var(--text-main); border-left: 4px solid var(--accent-color); padding-left: 8px; margin: 20px 0 10px 0; font-weight: bold; }
        .result-text { font-size: 0.85rem; line-height: 1.6; color: var(--text-main); background: rgba(255, 255, 255, 0.4); padding: 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(5px); }
        body.theme-night .result-text { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; }
        .affirmation-text { font-size: 1.05rem; font-weight: bold; color: var(--accent-color); text-align: center; border: 2px dashed var(--accent-color); }

        .affiliate-box { background: rgba(255,255,255,0.5); border: 2px dashed var(--accent-color); border-radius: 16px; padding: 15px; margin-top: 10px; display: flex; align-items: center; gap: 12px; }
        body.theme-night .affiliate-box { background: rgba(0,0,0,0.3); }
        .product-info { flex-grow: 1; }
        .product-title { font-size: 0.85rem; font-weight: bold; margin-bottom: 2px; }
        .product-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.3; }
        .buy-btn { background: var(--accent-color); color: #fff; text-decoration: none; font-size: 0.8rem; font-weight: bold; padding: 12px 14px; border-radius: 20px; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: transform 0.2s; }

        .sns-btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .sns-btn { width: 100%; background-color: var(--card-bg); color: var(--text-main); border: 2px solid var(--accent-color); padding: 12px; border-radius: 12px; font-size: 0.85rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }

        .reset-btn { background: none; border: none; color: var(--text-muted); text-decoration: underline; padding: 15px; cursor: pointer; margin: 10px auto; display: block; font-size: 0.8rem; }

        /* モーダル・トースト等 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal.show { display: flex; animation: fadeIn 0.3s; }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 350px; border-radius: 20px; padding: 20px; position: relative; text-align: center; }
        .name-input { width: 80%; padding: 10px; margin: 15px 0; border: 2px solid var(--accent-color); border-radius: 10px; font-size: 1rem; text-align: center; }
        .save-btn { background: var(--accent-color); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        .toast { position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; z-index: 9999; white-space: nowrap; transition: bottom 0.4s; }
        .toast.show { bottom: 30px; }

        /* パーティクル・スタンプ */
        .stamp-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
        .bg-stamp { position: absolute; opacity: 0; animation: fadeStampIn 1s forwards; filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.1)); }
        @keyframes fadeStampIn { to { opacity: 0.35; } }
        
        .floating-heart { position: absolute; font-size: 1.5rem; pointer-events: none; animation: floatHeart 1s ease-out forwards; z-index: 50; }
        @keyframes floatHeart { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(1.5); } }
        
        .cat-shower-item { position: absolute; pointer-events: none; z-index: 9998; font-size: 2rem; animation: floatShower linear forwards; }
        @keyframes floatShower { 0% { opacity: 0; transform: translateY(100vh) scale(0.5) rotate(0deg); } 10% { opacity: 1; transform: translateY(80vh) scale(1) rotate(10deg); } 90% { opacity: 1; transform: translateY(20vh) scale(1) rotate(-10deg); } 100% { opacity: 0; transform: translateY(-10vh) scale(1.5) rotate(20deg); } }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes purrrShake { 0%, 100% { transform: translateX(0); opacity: 0.5; } 25% { transform: translateX(-1px); opacity: 0.8; } 75% { transform: translateX(1px); opacity: 0.8; } }

        footer { margin-top: auto; padding: 20px; font-size: 0.7rem; color: var(--text-muted); text-align: center; z-index: 10; }
    </style>
</head>
<body>
    <div class="flash-overlay" id="flashOverlay"></div>
    <div id="catShowerContainer" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9998; overflow: hidden;"></div>
    <div class="stamp-container" id="stampContainer"></div>

    <div class="breathe-overlay" id="breatheOverlay">
        <div class="breathe-circle" id="breatheCircle">🐱</div>
        <div class="breathe-text" id="breatheText">まずは、息を全部吐き出すにゃん...</div>
        <div class="breathe-subtext" id="breatheSubtext"></div>
        <button class="close-breathe" id="closeBreatheBtn" onclick="stopBreathing()">深呼吸を終える</button>
    </div>

    <!-- 名前設定モーダル -->
    <div class="modal" id="nameModal">
        <div class="modal-content">
            <h2 style="color:var(--accent-color); margin-top:0;">🐾 お名前を教えてにゃ</h2>
            <p style="font-size: 0.85rem; color:var(--text-muted);">猫ちゃんがあなたを名前で呼びます</p>
            <input type="text" id="nameInput" class="name-input" placeholder="例: はなこ" maxlength="10">
            <button class="save-btn" onclick="saveName()">決定にゃん！</button>
        </div>
    </div>

    <header>
        <h1 id="mainTitle">🐾 ニャンコ占いの館</h1>
        <div class="subtitle" id="subTitle">画面をタップして猫ちゃんを呼ぶにゃん</div>
        <button class="name-btn" onclick="openNameModal()">⚙️ お名前を変更する</button>
        
        <div class="status-board" id="statusBoard">
            <div id="titleBadge" class="badge highlight">称号: 見習い</div>
            <div id="encounterBadge" class="badge">お世話: 0回</div>
        </div>
    </header>

    <main>
        <div class="card-container" id="cardContainer">
            <div class="rarity-badge" id="rarityBadge">R</div>
            <div class="card" id="tarotCard">
                <div class="card-back"></div>
                <div class="card-front">
                    <div class="card-emoji" id="cardEmoji">🐱</div>
                    <div class="card-mood" id="cardMood"></div>
                    <div class="card-name" id="cardName">猫ちゃん</div>
                </div>
            </div>
        </div>

        <div class="result-container" id="resultContainer">
            <div class="purrr-effect">ゴロゴロ… ゴロゴロ…</div>

            <button class="pet-btn" id="petBtn">🖐️ この子をなでなでする</button>
            <div class="pet-response" id="petResponse"></div>

            <div class="section-title">💖 今日の全肯定メッセージ</div>
            <div class="result-text affirmation-text" id="textAffirmation"></div>

            <div class="section-title">🐱 あなたの「お世話係」からの言葉</div>
            <div class="result-text" id="textPower"></div>

            <button class="breathe-btn" onclick="startBreathing()">🧘‍♀️ 猫ちゃんと一緒に「1分間の深呼吸」をする</button>

            <div class="section-title">🐟 この子に感謝の品を貢ぐ</div>
            <div class="affiliate-box">
                <div class="product-info">
                    <div class="product-title" id="productTitle"></div>
                    <div class="product-desc" id="productDesc"></div>
                </div>
                <a href="" target="_blank" rel="noopener noreferrer" class="buy-btn" id="productLink">貢ぐにゃん</a>
            </div>

            <div class="sns-btn-group">
                <button class="sns-btn x" id="shareXBtn">📱 X / Threads で結果をシェア</button>
                <button class="sns-btn sub" id="shareSubBtn">📝 コピーする（ブログ・LINE用）</button>
            </div>

            <button class="reset-btn" id="resetBtn">別の猫ちゃんを呼ぶ</button>
            <button class="reset-btn" onclick="clearStamps()" style="margin-top: 0; font-size: 0.7rem; color: rgba(0,0,0,0.3);">🧹 背景の思い出をリセット</button>
        </div>
    </main>

    <div class="toast" id="toast">🐾 コピー完了！</div>

    <footer>
        &copy; ニャンコ占いの館<br>
        <span style="font-size: 0.65rem;">※メニューから「ホーム画面に追加」して毎日の日課にしてにゃ🐾</span>
    </footer>

    <script>
        // --- ユーザー情報の取得 ---
        let userName = localStorage.getItem('nyanko_name') || 'あなた';
        let encounterCount = parseInt(localStorage.getItem('nyanko_encounter_count')) || 0;
        let affectionData = JSON.parse(localStorage.getItem('nyanko_affection')) || {};
        let savedStamps = JSON.parse(localStorage.getItem('nyanko_stamps')) || [];

        // --- 全73種類の猫データ（超巨大配列） ---
        const catData = [
            // SEC (5種)
            { id: "sec1", rarity: "SEC", name: "銀河を創りし 宇宙猫", emoji: "🌌", power: "{name}、自分の小ささに悩んでいないか？お前の心には立派な宇宙が広がっているにゃん。周りのノイズなんて気にしなくていい。自分の直感を大きく信じるにゃん！", itemTitle: "家庭用 プラネタリウム", itemDesc: "お部屋を宇宙空間に変える癒やし。", keyword: "プラネタリウム" },
            { id: "sec2", rarity: "SEC", name: "時をかける スチームパンク猫", emoji: "🕰️", power: "「あの時…」という後悔で心をすり減らしているにゃ？これまで選んだ道はすべて『今の{name}』を輝かせる伏線だにゃ。今日はただ『今日』を大切に抱きしめるにゃん。", itemTitle: "アンティーク調 砂時計", itemDesc: "時間の流れを優しく可視化する癒やし。", keyword: "砂時計+アンティーク" },
            { id: "sec3", rarity: "SEC", name: "記憶を紡ぐ アカシック猫", emoji: "📖", power: "得体の知れない孤独は、魂が新しいステージへ進もうとしている成長痛にゃ。大丈夫、私が記憶の糸を優しくほぐすにゃ。{name}は決して一人じゃないにゃん。", itemTitle: "不思議な 万華鏡", itemDesc: "覗くたびに別の世界が見える光の芸術品。", keyword: "万華鏡" },
            { id: "sec4", rarity: "SEC", name: "次元を渡る クァンタム猫", emoji: "🌀", power: "可能性の波に揺られて不安になってるにゃ？どの次元の{name}も素晴らしいにゃ。焦らず、今の世界で一番ワクワクする選択をするだけでいいにゃん！", itemTitle: "癒やしの ガリレオ温度計", itemDesc: "不思議な浮力で心を落ち着かせるインテリア。", keyword: "ガリレオ温度計" },
            { id: "sec5", rarity: "SEC", name: "海の底の マーメイドキャット", emoji: "🧜‍♀️", power: "深い海の底のように、心が沈んでいるにゃ？無理して浮かび上がらなくていいにゃ。今は私の歌声を聴いて、心の傷が癒えるまで静かに休む時にゃん。", itemTitle: "波の音 プロジェクターライト", itemDesc: "海の中にいるような安らぎの空間を作る。", keyword: "プロジェクター+海" },

            // UR (10種)

                    petResponse.innerText = ["シャー！（急に触らないでにゃ！）", "スンッ（そっぽを向かれた）", "…（じっと手を見ている）"][Math.floor(Math.random()*3)];
                } else if (currentLevel < 10) {
                    petResponse.innerText = ["にゃ〜ん💖（もっと撫でて！）", "ゴロゴロ…ゴロゴロ…🎵", "スリスリ…🐾"][Math.floor(Math.random()*3)];
                } else {
                    petResponse.innerText = [`${userName}大好きにゃあああん💕`, "チュッ🐾（鼻キスをしてくれた！）", "（膝の上で丸くなって眠り始めた…）"][Math.floor(Math.random()*3)];
                }
                
                const paradeChance = currentLevel > 10 ? 0.6 : (currentLevel > 5 ? 0.3 : 0.1);
                if (Math.random() < paradeChance) startCatShower(15);
            }

            const emojis = ['🐾', '💕', '🐱', '✨', '🐟', '🎀', '⭐', '🎵'];
            const newStamp = {
                emoji: emojis[Math.floor(Math.random() * emojis.length)],
                x: Math.random() * 90, y: Math.random() * 90 + 5, 
                size: Math.random() * 1.5 + 1.0, rot: Math.random() * 60 - 30 
            };
            savedStamps.push(newStamp);
            if(savedStamps.length > 150) savedStamps.shift(); 
            localStorage.setItem('nyanko_stamps', JSON.stringify(savedStamps));
            
            const el = document.createElement('div');
            el.className = 'bg-stamp';
            el.innerText = newStamp.emoji;
            el.style.left = newStamp.x + 'vw';
            el.style.top = newStamp.y + 'vh';
            el.style.fontSize = newStamp.size + 'rem';
            el.style.transform = `rotate(${newStamp.rot}deg)`;
            stampContainer.appendChild(el);
        });

        // === 1分間 深呼吸（マインドフルネス）ロジック ===
        window.startBreathing = function() {
            if(isBreathing) return;
            isBreathing = true;
            const overlay = document.getElementById('breatheOverlay');
            const circle = document.getElementById('breatheCircle');
            const text = document.getElementById('breatheText');
            const subtext = document.getElementById('breatheSubtext');
            const closeBtn = document.getElementById('closeBreatheBtn');
            
            overlay.classList.add('show');
            circle.style.transform = 'scale(1)';
            text.innerText = "まずは、息を全部吐き出すにゃん...";
            subtext.innerText = "";
            closeBtn.style.opacity = '0';

            let cycle = 0;
            const maxCycles = 5; // 1サイクル10秒 × 5回 = 約50秒 + 前後で約1分
            
            const praises = ["上手だにゃ", "いい感じにゃん", "嫌なものを全部出すにゃ", "肩の力を抜くにゃ", `${userName}、えらいにゃん`];

            setTimeout(() => { breatheCycle(); }, 3000);

            function breatheCycle() {
                if(!isBreathing) return;
                if(cycle >= maxCycles) {
                    finishBreathing();
                    return;
                }

                // 吸う（4秒）
                text.innerText = "すーっ……（吸う）";
                subtext.innerText = "";
                circle.style.transition = 'transform 4s ease-out';
                circle.style.transform = 'scale(1.8)';
                
                breatheInterval = setTimeout(() => {
                    if(!isBreathing) return;
                    // 吐く（6秒）
                    text.innerText = "はーっ……（吐く）";
                    subtext.innerText = praises[Math.floor(Math.random() * praises.length)];
                    circle.style.transition = 'transform 6s ease-in-out';
                    circle.style.transform = 'scale(1)';
                    
                    cycle++;
                    breatheInterval = setTimeout(breatheCycle, 6000);
                }, 4000);
            }

            function finishBreathing() {
                text.innerText = `${userName}、えらいにゃん！\n心がしっかり整ったにゃ🐾`;
                subtext.innerText = "今日もゆっくり休んでにゃ";
                closeBtn.style.opacity = '1';
                isBreathing = false;
            }
        };

        window.stopBreathing = function() {
            isBreathing = false;
            clearTimeout(breatheInterval);
            document.getElementById('breatheOverlay').classList.remove('show');
        };

        document.getElementById('resetBtn').addEventListener('click', () => {
            isFlipped = false;
            currentResult = null;
            document.getElementById('resultContainer').classList.remove('show');
            cardContainer.classList.remove('flipped');
            cardContainer.className = 'card-container';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        document.getElementById('shareXBtn').addEventListener('click', () => {
            const affirm = document.getElementById('textAffirmation').innerText;
            const text = `【ニャンコ占いの館🐾】\n${userName}のお世話係は「${currentResult.name}」でした！\n\n💖今日の全肯定:\n「${affirm}」\n\n👇猫と一緒に深呼吸して癒やされる\n${window.location.href}\n#ニャンコ占いの館 #癒やし #猫`;
            copyText(text);
        });
        document.getElementById('shareSubBtn').addEventListener('click', () => {
            const affirm = document.getElementById('textAffirmation').innerText;
            const text = `## 🐾 今日のニャンコ占い\n\n今日、${userName}の心を癒やしてくれたのは **${currentResult.name}** でした🐱\n\n> **💖 猫ちゃんからの全肯定**\n> 「${affirm}」\n\n毎日疲れている皆さんも、完全無料の「ニャンコ占いの館」で深呼吸して癒やされてみてください。\n\n🔗 **無料で占う👇**\n[ニャンコ占いの館を開く](${window.location.href})`;
            copyText(text);
        });

        function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(showToast).catch(fallbackCopy);
            } else { fallbackCopy(text); }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = typeof text === 'string' ? text : "コピー失敗";
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); showToast(); } catch (err) { alert("画面をスクショしてシェアしてにゃん🐾"); }
            document.body.removeChild(textArea);
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => { t.classList.remove('show'); }, 3000);
        }
    </script>
</body>
