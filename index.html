<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ニャンコ占いの館 | あなたに寄り添う癒やしの時間</title>
    <style>
        /* 時間帯によって切り替わるテーマ */
        :root {
            --bg-grad-start: #fff0f5; --bg-grad-end: #ffe4e1;
            --text-main: #5d4037; --accent-color: #ff8da1;
            --card-bg: #ffffff; --text-muted: #8d6e63;
        }
        body.theme-morning { --bg-grad-start: #f0f8ff; --bg-grad-end: #e6e6fa; --text-main: #4a4a4a; --accent-color: #87cefa; }
        body.theme-night { --bg-grad-start: #2b1b3d; --bg-grad-end: #1a1025; --text-main: #e6e6fa; --accent-color: #dda0dd; --card-bg: #3a2b4d; --text-muted: #b0c4de; }

        body {
            background: linear-gradient(135deg, var(--bg-grad-start) 0%, var(--bg-grad-end) 100%);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden; -webkit-tap-highlight-color: transparent; transition: background 1s ease;
        }

        header { text-align: center; padding: 20px 20px 5px 20px; z-index: 10; position: relative; width: 100%; box-sizing: border-box; }
        h1 { font-size: 1.6rem; color: var(--accent-color); margin: 0 0 5px 0; letter-spacing: 0.1em; text-shadow: 1px 1px 0px rgba(255,255,255,0.5); }
        .subtitle { font-size: 0.8rem; color: var(--text-muted); font-weight: bold; }

        /* 記録要素：ステータスボード */
        .status-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 15px; animation: fadeIn 1s ease-out; }
        .badge { background-color: var(--card-bg); color: var(--accent-color); border: 2px solid var(--accent-color); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .badge.highlight { background: var(--accent-color); color: white; }

        main { width: 100%; max-width: 480px; padding: 10px 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; z-index: 10; position: relative; }

        /* 図鑑ボタン */
        .book-btn { background: #fff; color: var(--text-main); border: 2px dashed var(--accent-color); padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .book-btn:hover { background: var(--accent-color); color: #fff; }

        /* カード演出 */
        .card-container { perspective: 1000px; width: 160px; height: 260px; margin: 10px 0 20px 0; cursor: pointer; position: relative; }
        .rarity-badge { position: absolute; top: -10px; right: -10px; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; color: white; z-index: 10; opacity: 0; transform: scale(0); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s; }
        .card-container.flipped .rarity-badge { opacity: 1; transform: scale(1) rotate(10deg); }
        
        .rarity-sec { background: linear-gradient(135deg, #000000, #4b0082); box-shadow: 0 0 20px #8a2be2; border: 2px solid #ffd700; color: #ffd700; }
        .rarity-ur { background: linear-gradient(135deg, #ffd700, #ff8c00); box-shadow: 0 0 15px #ffd700; border: 2px solid #fff; }
        .rarity-ssr { background: linear-gradient(135deg, #ff00ff, #8a2be2); box-shadow: 0 0 15px #ff00ff; border: 2px solid #fff; }
        .rarity-sr { background: linear-gradient(135deg, #00bfff, #1e90ff); box-shadow: 0 0 10px #00bfff; border: 2px solid #fff; }
        .rarity-r { background: linear-gradient(135deg, #32cd32, #228b22); box-shadow: 0 0 5px #32cd32; border: 2px solid #fff; }

        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-container.flipped .card { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 24px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card-back { background: var(--accent-color); border: 3px solid rgba(255,255,255,0.5); }
        .card-back::after { content: "🐾\A\A肉球でタッチ"; white-space: pre; text-align: center; font-size: 0.95rem; font-weight: bold; color: #fff; letter-spacing: 0.05em; animation: pulse 2s infinite ease-in-out; }
        .card-front { background-color: var(--card-bg); transform: rotateY(180deg); border: 3px solid var(--accent-color); padding: 15px; box-sizing: border-box; }

        .card-emoji { font-size: 3.5rem; margin-bottom: 8px; animation: float 3s infinite ease-in-out; }
        .card-mood { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 2px; text-align: center; }
        .card-name { font-size: 0.95rem; font-weight: bold; color: var(--accent-color); text-align: center; }
        .new-badge { position: absolute; top: 10px; left: 10px; background: #ff4757; color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; animation: blink 1s infinite; display: none; }
        .is-new .new-badge { display: block; }

        .result-container { display: none; width: 100%; opacity: 0; transform: translateY(10px); transition: opacity 0.5s ease-out, transform 0.5s ease-out; }
        .result-container.show { display: block; opacity: 1; transform: translateY(0); }

        /* 癒やし機能：なでなでボタン */
        .pet-btn { width: 100%; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #d81b60; border: 2px solid #ff8da1; padding: 15px; border-radius: 16px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin: 15px 0; box-shadow: 0 5px 15px rgba(255,141,161,0.3); transition: transform 0.1s; position: relative; overflow: hidden; }
        .pet-btn:active { transform: scale(0.96); }
        .pet-response { text-align: center; color: var(--accent-color); font-weight: bold; font-size: 0.9rem; min-height: 20px; margin-bottom: 10px; transition: 0.3s; }

        .section-title { font-size: 0.9rem; color: var(--text-main); border-left: 4px solid var(--accent-color); padding-left: 8px; margin: 20px 0 10px 0; font-weight: bold; }
        .result-text { font-size: 0.85rem; line-height: 1.6; color: var(--text-main); background: rgba(255, 255, 255, 0.4); padding: 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(5px); }
        body.theme-night .result-text { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.1); }
        
        .affirmation-text { font-size: 1.05rem; font-weight: bold; color: var(--accent-color); text-align: center; border: 2px dashed var(--accent-color); }

        .affiliate-box { background: rgba(255,255,255,0.5); border: 2px dashed var(--accent-color); border-radius: 16px; padding: 15px; margin-top: 10px; display: flex; align-items: center; gap: 12px; }
        body.theme-night .affiliate-box { background: rgba(0,0,0,0.3); }
        .product-info { flex-grow: 1; }
        .product-title { font-size: 0.85rem; font-weight: bold; margin-bottom: 2px; }
        .product-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.3; }

        .buy-btn { background: var(--accent-color); color: #fff; text-decoration: none; font-size: 0.8rem; font-weight: bold; padding: 12px 14px; border-radius: 20px; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: transform 0.2s; }
        .buy-btn:hover { transform: scale(1.03); }

        /* SNSシェア群 */
        .sns-btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .sns-btn { width: 100%; background-color: var(--card-bg); color: var(--text-main); border: 2px solid var(--accent-color); padding: 12px; border-radius: 12px; font-size: 0.85rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
        .sns-btn.x { border-color: #1DA1F2; color: #1DA1F2; }
        .sns-btn.insta { border-color: #E1306C; color: #E1306C; }

        .reset-btn { background: none; border: none; color: var(--text-muted); text-decoration: underline; padding: 15px; cursor: pointer; margin: 10px auto; display: block; font-size: 0.8rem; }

        /* 図鑑モーダル */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal.show { display: flex; animation: fadeIn 0.3s; }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 400px; max-height: 80vh; border-radius: 20px; padding: 20px; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }
        .book-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .book-item { background: rgba(0,0,0,0.05); border-radius: 10px; padding: 10px 5px; text-align: center; font-size: 1.5rem; filter: grayscale(100%); opacity: 0.5; }
        .book-item.collected { filter: grayscale(0%); opacity: 1; background: #fff0f5; border: 1px solid #ffb7c5; }
        .book-progress { text-align: center; font-weight: bold; color: var(--accent-color); margin-top: 10px; }

        /* エフェクト系 */
        .toast { position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; z-index: 9999; white-space: nowrap; transition: bottom 0.4s; }
        .toast.show { bottom: 30px; }

        .floating-heart { position: absolute; font-size: 1.5rem; pointer-events: none; animation: floatHeart 1s ease-out forwards; z-index: 50; }
        
        body.screenshot-mode header, body.screenshot-mode .book-btn, body.screenshot-mode .sns-btn-group, body.screenshot-mode .reset-btn, body.screenshot-mode footer { display: none; }
        .screenshot-overlay { display: none; position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; z-index: 9999; }
        body.screenshot-mode .screenshot-overlay { display: block; }

        footer { margin-top: auto; padding: 20px; font-size: 0.7rem; color: var(--text-muted); text-align: center; }

        @keyframes floatHeart { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(1.5); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* 背景スタンプ（なでなでの痕跡）用スタイル */
        .stamp-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
        .bg-stamp { position: absolute; opacity: 0; animation: fadeStampIn 1s forwards; filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.1)); }
        @keyframes fadeStampIn { to { opacity: 0.35; } }

        /* 追加: 豪華ガチャ演出用CSS */
        .gacha-charging { animation: shakeCard 0.1s infinite; }
        .gacha-charging.r { filter: drop-shadow(0 0 10px #32cd32); }
        .gacha-charging.sr { filter: drop-shadow(0 0 20px #1e90ff); animation-duration: 0.08s; }
        .gacha-charging.ssr { filter: drop-shadow(0 0 30px #ff00ff); animation-duration: 0.06s; }
        .gacha-charging.ur { filter: drop-shadow(0 0 50px #ffd700); animation-duration: 0.04s; }
        .gacha-charging.sec { filter: drop-shadow(0 0 80px #8a2be2); animation-duration: 0.02s; }
        
        .flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.1s; }
        .flash-overlay.show { opacity: 1; transition: opacity 0.5s ease-out; }
        .flash-overlay.fadeOut { opacity: 0; transition: opacity 1s ease-in; }

        @keyframes shakeCard { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-1px, -2px) rotate(-1deg); } 40% { transform: translate(-3px, 0px) rotate(1deg); } 60% { transform: translate(3px, 2px) rotate(0deg); } 80% { transform: translate(1px, -1px) rotate(1deg); } 100% { transform: translate(-1px, 2px) rotate(-1deg); } }

        /* 図鑑のレアリティ枠 */
        .book-item.collected.rarity-sec-border { border: 2px solid #8a2be2; background: #f3e5f5; }
        .book-item.collected.rarity-ur-border { border: 2px solid #ffd700; background: #fffde7; }
        .book-item.collected.rarity-ssr-border { border: 2px solid #ff00ff; background: #fce4ec; }
        .book-item.collected.rarity-sr-border { border: 2px solid #00bfff; background: #e1f5fe; }
        .book-item.collected.rarity-r-border { border: 2px solid #32cd32; background: #e8f5e9; }
    </style>
</head>
<body>
    
    <!-- 追加: ガチャフラッシュ演出用 -->
    <div class="flash-overlay" id="flashOverlay"></div>

    <!-- 背景にスタンプを貯めるキャンバス -->
    <div class="stamp-container" id="stampContainer"></div>

    <header>
        <h1 id="mainTitle">🐾 ニャンコ占いの館</h1>
        <div class="subtitle" id="subTitle">画面をタップして猫ちゃんを呼ぶにゃん</div>
        
        <div class="status-board" id="statusBoard">
            <div id="titleBadge" class="badge highlight">称号: 見習い</div>
            <div id="encounterBadge" class="badge">お世話: 0回</div>
            <div id="streakBadge" class="badge">連続: 1日目🔥</div>
        </div>
    </header>

    <div class="screenshot-overlay" id="screenshotOverlay">📸 画面をスクショしてね（タップで戻る）</div>

    <main>
        <button class="book-btn" onclick="openBook()">📖 猫ちゃん図鑑を見る</button>

        <div class="card-container" id="cardContainer">
            <div class="new-badge">NEW!</div>
            <div class="rarity-badge" id="rarityBadge">R</div>
            <div class="card" id="tarotCard">
                <div class="card-back"></div>
                <div class="card-front">
                    <div class="card-emoji" id="cardEmoji">🐱</div>

        <div class="result-container" id="resultContainer">

            <div class="section-title">💖 今日の全肯定メッセージ</div>

                    <div class="product-desc" id="productDesc"></div>
                </div>
                <a href="" target="_blank" rel="noopener noreferrer" class="buy-btn" id="productLink">貢ぐにゃん</a>

            <div class="sns-btn-group">

                <button class="sns-btn insta" id="shareInstaBtn">📸 インスタ用にスクショモードにする</button>
            </div>

            <button class="reset-btn" id="resetBtn">別の猫ちゃんを呼ぶ</button>
            <button class="reset-btn" onclick="clearStamps()" style="margin-top: 0; font-size: 0.7rem; color: rgba(0,0,0,0.3);">🧹 背景の思い出をリセットする</button>
        </div>
    </main>

    <!-- 猫図鑑モーダル -->
    <div class="modal" id="bookModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeBook()">×</span>
            <h2 style="text-align:center; color:var(--accent-color); margin-top:0;">📖 あなたの猫図鑑</h2>
            <div class="book-progress" id="bookProgress">収集率: 0%</div>
            <div class="book-grid" id="bookGrid"></div>
        </div>
    </div>

    <div class="toast" id="toast">🐾 コピー完了！</div>

    <footer>
        &copy; ニャンコ占いの館<br>
        <span style="font-size: 0.65rem;">※「ホーム画面に追加」して毎日の日課にしてにゃ🐾</span>
    </footer>

    <script>
        // --- 1. データ定義（多種多様・全25種+SEC） ---

                el.style.top = s.y + 'vh';
                el.style.fontSize = s.size + 'rem';
                el.style.transform = `rotate(${s.rot}deg)`;
                stampContainer.appendChild(el);
            });
        }
        renderStamps(); // ページ読み込み時に実行

        // リセット機能（グローバル関数化）
        window.clearStamps = function() {
            if(confirm("画面に刻まれた猫ちゃんとの思い出（スタンプ）を消去しますか？")) {
                savedStamps = [];
                localStorage.removeItem('nyanko_stamps');
                renderStamps();
            }
        };

        // --- 4. メイン処理（ガチャ・結果表示） ---
        const urlParams = new URLSearchParams(window.location.search);
        const userA8Id = urlParams.get('a8') ? urlParams.get('a8').trim() : '';

        document.getElementById('cardContainer').addEventListener('click', () => {
            if (isFlipped) return;
            isFlipped = true;

            // ガチャ抽選ロジック
            const rand = Math.random();
            let targetRarity = "R";
            if (rand < 0.01) targetRarity = "SEC";       // 1%
            else if (rand < 0.05) targetRarity = "UR";   // 4%
            else if (rand < 0.20) targetRarity = "SSR";  // 15%
            else if (rand < 0.50) targetRarity = "SR";   // 30%
            
            const filteredCats = catData.filter(c => c.rarity === targetRarity);
            const baseCat = filteredCats[Math.floor(Math.random() * filteredCats.length)];
            const mood = moods[Math.floor(Math.random() * moods.length)];
            currentResult = { ...baseCat, mood: mood };

            // UI反映の準備
            const container = document.getElementById('cardContainer');
            const flash = document.getElementById('flashOverlay');
            
            // ガチャ溜め演出開始
            container.classList.add('gacha-charging', currentResult.rarity.toLowerCase());
            
            // レア度に応じた溜め時間の設定
            let chargeTime = 600;
            if(targetRarity === 'SR') chargeTime = 1200;
            if(targetRarity === 'SSR') chargeTime = 1800;
            if(targetRarity === 'UR') chargeTime = 2500;
            if(targetRarity === 'SEC') chargeTime = 3500;

            setTimeout(() => {
                // 溜め終了、演出クラスを外す
                container.classList.remove('gacha-charging', currentResult.rarity.toLowerCase());
                
                // UR, SEC, SSR ならフラッシュ演出を入れる
                if(['SSR', 'UR', 'SEC'].includes(targetRarity)) {
                    flash.classList.add('show');
                    setTimeout(() => { 
                        flash.classList.remove('show'); 
                        flash.classList.add('fadeOut'); 
                        setTimeout(() => flash.classList.remove('fadeOut'), 1000); 
                    }, 150);
                }

                // UI反映実行
                container.className = `card-container ${currentResult.rarity.toLowerCase()}`;
                document.getElementById('rarityBadge').className = `rarity-badge rarity-${currentResult.rarity.toLowerCase()}`;
                document.getElementById('rarityBadge').innerText = currentResult.rarity;

                document.getElementById('cardEmoji').innerText = currentResult.emoji;
                document.getElementById('cardMood').innerText = currentResult.mood;
                document.getElementById('cardName').innerText = currentResult.name;
                document.getElementById('textPower').innerText = currentResult.power;
                document.getElementById('productTitle').innerText = currentResult.itemTitle;
                document.getElementById('productDesc').innerText = currentResult.itemDesc;
                document.getElementById('textAffirmation').innerText = affirmations[Math.floor(Math.random() * affirmations.length)];

                // アフィリエイトリンク生成
                let finalLink = `https://search.rakuten.co.jp/search/mall/${currentResult.keyword}/`;
                if (userA8Id && userA8Id.startsWith("s0000")) {
                    finalLink = `https://px.a8.net/svt/ejp?a8mat=${userA8Id}/&rakuten=y&a8url=https%3A%2F%2Fsearch.rakuten.co.jp%2Fsearch%2Fmall%2F${currentResult.keyword}%2F`;
                }
                document.getElementById('productLink').href = finalLink;

                // 記録更新（コレクション）
                if (!collection.includes(currentResult.id)) {
                    collection.push(currentResult.id);
                    localStorage.setItem('nyanko_collection', JSON.stringify(collection));
                    container.classList.add('is-new');
                } else {
                    container.classList.remove('is-new');
                }

                // 記録更新（回数）
                encounterCount++;
                localStorage.setItem('nyanko_encounter_count', encounterCount);
                document.getElementById('encounterBadge').innerText = `お世話: ${encounterCount}回`;
                document.getElementById('titleBadge').innerText = `称号: ${getCatTitle(encounterCount)}`;

                // アニメーション
                container.classList.add('flipped');
                setTimeout(() => {
                    document.getElementById('resultContainer').classList.add('show');
                    document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 600);
            }, chargeTime);
        });

        // --- 5. 究極の癒やし：なでなで機能 ---
        document.getElementById('petBtn').addEventListener('click', (e) => {
            // ハートエフェクト (一時的な飛び散りアニメーション)
            for(let i=0; i<3; i++){
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerText = ['💖','✨','🐾','💕'][Math.floor(Math.random()*4)];
                const rect = e.target.getBoundingClientRect();
                heart.style.left = (rect.left + Math.random() * rect.width) + 'px';
                heart.style.top = (rect.top + window.scrollY) + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1000);
            }

            // 🐾 多様化した蓄積するスタンプエフェクト（思い出が背景に刻印される）
            const emojis = ['🐾', '💕', '🐱', '✨', '🐟', '🎀', '⭐', '🎵'];
            const newStamp = {
                emoji: emojis[Math.floor(Math.random() * emojis.length)],
                x: Math.random() * 90, // vw
                y: Math.random() * 90 + 5, // vh (上部は少し避ける)
                size: Math.random() * 1.5 + 1.0, // 1.0rem ~ 2.5rem
                rot: Math.random() * 60 - 30 // -30deg ~ 30deg
            };
            
            savedStamps.push(newStamp);
            // 上限100個を超えたら古いものから消す（重くならないための安全装置）
            if(savedStamps.length > 100) savedStamps.shift();
            localStorage.setItem('nyanko_stamps', JSON.stringify(savedStamps));
            
            // 新しいスタンプをその場で画面に追加
            const el = document.createElement('div');
            el.className = 'bg-stamp';
            el.innerText = newStamp.emoji;
            el.style.left = newStamp.x + 'vw';
            el.style.top = newStamp.y + 'vh';
            el.style.fontSize = newStamp.size + 'rem';
            el.style.transform = `rotate(${newStamp.rot}deg)`;
            stampContainer.appendChild(el);

            // テキスト変化
            document.getElementById('petResponse').innerText = petResponses[Math.floor(Math.random() * petResponses.length)];
        });

        // --- 6. 図鑑機能 ---
        window.openBook = function() {
            const grid = document.getElementById('bookGrid');
            grid.innerHTML = '';
            let collectedCount = 0;
            
            // レアリティ順にソート (SEC -> UR -> SSR -> SR -> R)
            const rarityOrder = { "SEC": 0, "UR": 1, "SSR": 2, "SR": 3, "R": 4 };
            const sortedCats = [...catData].sort((a, b) => rarityOrder[a.rarity] - rarityOrder[b.rarity]);

            sortedCats.forEach(cat => {
                const div = document.createElement('div');
                if (collection.includes(cat.id)) {
                    div.className = `book-item collected rarity-${cat.rarity.toLowerCase()}-border`;
                    div.innerText = cat.emoji;
                    div.title = `[${cat.rarity}] ${cat.name}`;
                    collectedCount++;
                } else {
                    div.className = 'book-item';
                    div.innerText = '❓';
                }
                grid.appendChild(div);
            });
            
            const percentage = Math.floor((collectedCount / catData.length) * 100);
            document.getElementById('bookProgress').innerText = `収集率: ${collectedCount}/${catData.length}匹 (${percentage}%)`;
            document.getElementById('bookModal').classList.add('show');
        };
        window.closeBook = function() { document.getElementById('bookModal').classList.remove('show'); };

        // リセット
        document.getElementById('resetBtn').addEventListener('click', () => {
            isFlipped = false;
            document.getElementById('resultContainer').classList.remove('show');
            document.getElementById('cardContainer').classList.remove('flipped');
            document.getElementById('petResponse').innerText = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // --- 7. エラー13回避：SNSシェア ---
        document.getElementById('shareXBtn').addEventListener('click', () => {
            const text = `【🐾ニャンコ占いの館】\n連続ログイン: ${streak}日目🔥\n今の私のお世話係は「${currentResult.mood} ${currentResult.name}」でした！\n\n👇あなたも無料で癒やされる\n${window.location.href}\n#ニャンコ占い #癒やし`;
            copyText(text);
        });
        document.getElementById('shareInstaBtn').addEventListener('click', () => {
            document.body.classList.add('screenshot-mode');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        document.body.addEventListener('click', (e) => {
            if (document.body.classList.contains('screenshot-mode') && !e.target.closest('.sns-btn')) {
                document.body.classList.remove('screenshot-mode');
            }
        });

        function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(showToast).catch(fallbackCopy);
            } else { fallbackCopy(text); }
        }
        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); showToast(); } 
            catch (err) { alert("コピーできませんでした。スクショしてね🐾"); }
            document.body.removeChild(textArea);
        }
        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
